<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sales & Incentive Performance Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.59.0/build/stlite.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.59.0/build/stlite.js"></script>
    <script>
      stlite.mount({
        requirements: ["pandas", "plotly", "numpy"],
        entrypoint: "app.py",
        files: {
          "app.py": `
import streamlit as st
import pandas as pd
import plotly.express as px
import numpy as np

# Page configuration
st.set_page_config(layout="wide", page_title="Incentive Dashboard")

st.title("📊 Enterprise Stock Age & Incentive Analytics Hub")
st.markdown("Upload your core operational datasets below to calculate spot incentives, track aging pipelines, and filter metrics.")

# Sidebar File Uploaders
st.sidebar.header("📁 Data Layer Uploads")
master_file = st.sidebar.file_uploader("1. Master Stock Report (CSV)", type=["csv"])
sales_file = st.sidebar.file_uploader("2. Product Wise Sales Report (CSV)", type=["csv"])

def assign_bucket(age):
    """Categorizes numerical age inputs into explicit business target buckets."""
    if pd.isna(age):
        return "Unknown"
    if 300 <= age <= 399:
        return "300–399 days"
    elif 400 <= age <= 499:
        return "400–499 days"
    elif 500 <= age <= 599:
        return "500–599 days"
    elif 600 <= age <= 699:
        return "600–699 days"
    elif age >= 700:
        return "700+ days"
    return "Current Stock (<300 days)"

def compute_incentives(row):
    """Calculates granular line-item cash payouts based on age and realized discount rates."""
    age = row['ProductAge']
    disc = row['CalculatedDiscountPct']
    mrp = row['MRP']
    qty = row['Quantity']
    
    if pd.isna(age) or pd.isna(mrp) or pd.isna(qty):
        return 0.0
        
    inc_pct = 0.0
    
    if 300 <= age <= 399:
        if abs(disc - 10) <= 1.5: inc_pct = 0.02
    elif 400 <= age <= 499:
        if abs(disc - 15) <= 1.5: inc_pct = 0.02
    elif 500 <= age <= 599:
        if abs(disc - 20) <= 1.5: inc_pct = 0.03
        elif abs(disc - 15) <= 1.5: inc_pct = 0.05
    elif 600 <= age <= 699:
        if abs(disc - 25) <= 1.5: inc_pct = 0.05
        elif abs(disc - 20) <= 1.5: inc_pct = 0.07
    elif age >= 700:
        if abs(disc - 35) <= 1.5: inc_pct = 0.07
        elif abs(disc - 25) <= 1.5: inc_pct = 0.10
        
    return inc_pct * mrp * qty

if master_file and sales_file:
    try:
        # Load Raw Files
        df_master = pd.read_csv(master_file)
        df_sales = pd.read_csv(sales_file)
        
        # Clean Master Stock Report Datatypes
        df_master['Age'] = pd.to_numeric(df_master['Age'], errors='coerce')
        df_master['AvailableQuantity'] = pd.to_numeric(df_master['AvailableQuantity'], errors='coerce').fillna(0)
        df_master['CTC'] = pd.to_numeric(df_master['CTC'], errors='coerce').fillna(0)
        df_master['MRP'] = pd.to_numeric(df_master['MRP'], errors='coerce').fillna(0)
        
        # Robust validation fallback for Master TotalCTC/TotalMRP records
        df_master['TotalCTC'] = pd.to_numeric(df_master['TotalCTC'], errors='coerce').fillna(0)
        df_master['TotalCTC'] = np.where(df_master['TotalCTC'] == 0, df_master['AvailableQuantity'] * df_master['CTC'], df_master['TotalCTC'])
        
        df_master['TotalMRP'] = pd.to_numeric(df_master['TotalMRP'], errors='coerce').fillna(0)
        df_master['TotalMRP'] = np.where(df_master['TotalMRP'] == 0, df_master['AvailableQuantity'] * df_master['MRP'], df_master['TotalMRP'])
        
        # Clean Sales Report Datatypes
        df_sales['ProductAge'] = pd.to_numeric(df_sales['ProductAge'], errors='coerce')
        df_sales['MRP'] = pd.to_numeric(df_sales['MRP'], errors='coerce').fillna(0)
        df_sales['Quantity'] = pd.to_numeric(df_sales['Quantity'], errors='coerce').fillna(0)
        df_sales['TotalDiscount'] = pd.to_numeric(df_sales['TotalDiscount'], errors='coerce').fillna(0)
        df_sales['TotalMRP'] = pd.to_numeric(df_sales['TotalMRP'], errors='coerce').fillna(0)
        
        # Resolve any missing Age fields in sales file using Master Stock data
        if 'ProductID' in df_master.columns and 'Age' in df_master.columns:
            age_mapping = df_master.set_index('ProductID')['Age'].to_dict()
            df_sales['ProductAge'] = df_sales['ProductAge'].fillna(df_sales['ProductID'].map(age_mapping))
            
        # Parse Dates safely for interactive timelines
        df_sales['BillDate'] = pd.to_datetime(df_sales['BillDate'], errors='coerce')
        df_sales['SaleMonth'] = df_sales['BillDate'].dt.strftime('%Y-%m').fillna('Unknown Month')
        df_sales['SaleDay'] = df_sales['BillDate'].dt.strftime('%Y-%m-%d').fillna('Unknown Day')
        
        # Apply standard classifications
        df_master['AgeBucket'] = df_master['Age'].apply(assign_bucket)
        df_sales['AgeBucket'] = df_sales['ProductAge'].apply(assign_bucket)
        
        # Calculate derived metrics
        df_sales['CalculatedDiscountPct'] = (df_sales['TotalDiscount'] / df_sales['TotalMRP'].replace(0, np.nan)) * 100
        df_sales['CalculatedDiscountPct'] = df_sales['CalculatedDiscountPct'].fillna(0)
        df_sales['AchievedIncentive'] = df_sales.apply(compute_incentives, axis=1)

        target_buckets = ["300–399 days", "400–499 days", "500–599 days", "600–699 days", "700+ days"]
        df_master_filtered_age = df_master[df_master['AgeBucket'].isin(target_buckets)]
        
        # ---------------------------------------------------------
        # SIDEBAR FILTERS (Interactive Engine)
        # ---------------------------------------------------------
        st.sidebar.markdown("---")
        st.sidebar.header("🔍 Interactive Filters")
        
        # Sales Person Selection
        salespeople = sorted([str(x) for x in df_sales['SalesPerson'].dropna().unique()])
        selected_sp = st.sidebar.selectbox("🎯 Select Sales Person Scope", ["All Staff"] + salespeople)
        
        # Dynamic Time Window Filters
        months = sorted([str(x) for x in df_sales['SaleMonth'].unique() if x != 'Unknown Month'])
        selected_month = st.sidebar.selectbox("🗓️ Select Month", ["All Months"] + months)
        
        days = sorted([str(x) for x in df_sales['SaleDay'].unique() if x != 'Unknown Day'])
        selected_day = st.sidebar.selectbox("📅 Select Day", ["All Days"] + days)
        
        # Apply Global Row Scope Filtering Base
        df_sales_filtered = df_sales.copy()
        if selected_sp != "All Staff":
            df_sales_filtered = df_sales_filtered[df_sales_filtered['SalesPerson'] == selected_sp]
        if selected_month != "All Months":
            df_sales_filtered = df_sales_filtered[df_sales_filtered['SaleMonth'] == selected_month]
        if selected_day != "All Days":
            df_sales_filtered = df_sales_filtered[df_sales_filtered['SaleDay'] == selected_day]

        # FIX 1: ISOLATING METRICS TO TARGET AGE BUCKETS ONLY
        df_sales_in_buckets = df_sales_filtered[df_sales_filtered['AgeBucket'].isin(target_buckets)]

        st.subheader("🎯 Aging Stock Performance Overview")
        col_m1, col_m2, col_m3 = st.columns(3)
        with col_m1:
            st.metric("💰 Incentives Disbursed", f"₹ {round(df_sales_in_buckets['AchievedIncentive'].sum()):,}")
        with col_m2:
            st.metric("📦 Units Cleared (Aged 300+ Days)", f"{int(round(df_sales_in_buckets['Quantity'].sum())):,}")
        with col_m3:
            st.metric("👤 Active Profile Filter Scope", f"{selected_sp}")

        st.markdown("---")

        # ---------------------------------------------------------
        # VISUAL ANALYTICS & TAB LAYER
        # ---------------------------------------------------------
        tab1, tab2, tab3 = st.tabs(["📈 Stock vs Sales Mix", "👤 Chronological Performance Matrix", "🔮 Upcoming Slabs Pipe"])
        
        with tab1:
            st.subheader("📋 Store Balance Sheet: Inventory vs Liquidation")
            st.markdown("Detailed itemized breakdown showing how many stock units are in store vs how many have been successfully sold.")
            
            # FIX 2: Generate exact tabular balance mapping
            sold_summary = df_sales[df_sales['AgeBucket'].isin(target_buckets)].groupby('AgeBucket')['Quantity'].sum().reset_index().rename(columns={'Quantity': 'Units Sold'})
            stock_summary = df_master_filtered_age.groupby('AgeBucket')['AvailableQuantity'].sum().reset_index().rename(columns={'AvailableQuantity': 'Stocks In Store'})
            inc_summary = df_sales[df_sales['AgeBucket'].isin(target_buckets)].groupby('AgeBucket')['AchievedIncentive'].sum().reset_index().rename(columns={'AchievedIncentive': 'Incentive Earned (₹)'})
            
            balance_df = pd.merge(stock_summary, sold_summary, on='AgeBucket', how='outer').fillna(0)
            balance_df = pd.merge(balance_df, inc_summary, on='AgeBucket', how='outer').fillna(0)
            
            balance_df['Stocks In Store'] = balance_df['Stocks In Store'].round(0).astype(int)
            balance_df['Units Sold'] = balance_df['Units Sold'].round(0).astype(int)
            balance_df['Incentive Earned (₹)'] = balance_df['Incentive Earned (₹)'].round(0).astype(int)
            
            # Calculate clearance percentage rate safely
            balance_df['Clearance Rate (%)'] = np.where(
                balance_df['Stocks In Store'] > 0, 
                (balance_df['Units Sold'] / (balance_df['Stocks In Store'] + balance_df['Units Sold'])) * 100, 
                100.0
            )
            balance_df['Clearance Rate (%)'] = balance_df['Clearance Rate (%)'].round(1)
            
            st.dataframe(balance_df, use_container_width=True, hide_index=True)
            
            st.markdown("---")
            chart_col1, chart_col2 = st.columns(2)
            
            with chart_col1:
                fig_pie_stock = px.pie(
                    balance_df, 
                    values='Stocks In Store', 
                    names='AgeBucket',
                    title="Warehouse Stock Volume Breakdown",
                    hole=0.4,
                    color_discrete_sequence=px.colors.sequential.Plotly3
                )
                fig_pie_stock.update_traces(textinfo='value+percent')
                st.plotly_chart(fig_pie_stock, use_container_width=True)
                
            with chart_col2:
                fig_compare = px.bar(
                    balance_df, 
                    x='AgeBucket', 
                    y=['Stocks In Store', 'Units Sold'],
                    barmode='group',
                    title="Side-by-Side Comparison: Current Stock vs. Units Sold",
                    labels={'value': 'Total Items Count', 'variable': 'Category Metric'},
                    color_discrete_sequence=['#31333F', '#FF4B4B']
                )
                st.plotly_chart(fig_compare, use_container_width=True)

        with tab2:
            st.subheader("👤 Chronological Performance Matrix")
            st.markdown("Track and evaluate team or individual contribution over time to liquidate aging asset buckets.")
            
            # FIX 3: Add dedicated "All Staff Summary" tab along with individual salesperson sub-tabs
            tab_options = ["🏆 All Staff Summary"] + salespeople
            sp_tabs = st.tabs(tab_options)
            
            for index, tab_title in enumerate(tab_options):
                with sp_tabs[index]:
                    if index == 0:
                        st.markdown("### 🏆 Combined Team Performance Timeline")
                        df_target_sales = df_sales_in_buckets.copy()
                    else:
                        st.markdown(f"### 👤 Performance Timeline for: **{tab_title}**")
                        df_target_sales = df_sales_in_buckets[df_sales_in_buckets['SalesPerson'] == tab_title]
                        
                    if not df_target_sales.empty:
                        # --- 1. MONTHWISE PROFILE ---
                        st.markdown("#### 🗓️ Month-wise Activity Report")
                        p_month = df_target_sales.pivot_table(index='SaleMonth', columns='AgeBucket', values='Quantity', aggfunc='sum', fill_value=0)
                        for b in target_buckets:
                            if b not in p_month.columns:
                                p_month[b] = 0
                        p_month = p_month[target_buckets]
                        p_month['Total Units Sold'] = p_month.sum(axis=1)
                        p_month['Total Incentive Earned (₹)'] = df_target_sales.groupby('SaleMonth')['AchievedIncentive'].sum().fillna(0)
                        
                        p_month = p_month.sort_index(ascending=True).reset_index()
                        for col in p_month.columns:
                            if col != 'SaleMonth':
                                p_month[col] = p_month[col].round(0).astype(int)
                        st.dataframe(p_month, use_container_width=True, hide_index=True)
                        
                        st.markdown("---")
                        
                        # --- 2. DAYWISE PROFILE ---
                        st.markdown("#### 📅 Day-wise Detailed Activity Ledger")
                        p_day = df_target_sales.pivot_table(index='SaleDay', columns='AgeBucket', values='Quantity', aggfunc='sum', fill_value=0)
                        for b in target_buckets:
                            if b not in p_day.columns:
                                p_day[b] = 0
                        p_day = p_day[target_buckets]
                        p_day['Total Units Sold'] = p_day.sum(axis=1)
                        p_day['Total Incentive Earned (₹)'] = df_target_sales.groupby('SaleDay')['AchievedIncentive'].sum().fillna(0)
                        
                        p_day = p_day.sort_index(ascending=True).reset_index()
                        for col in p_day.columns:
                            if col != 'SaleDay':
                                p_day[col] = p_day[col].round(0).astype(int)
                        st.dataframe(p_day, use_container_width=True, hide_index=True)
                    else:
                        st.info(f"No operational line item metrics recorded within the current filter profile selection.")

        with tab3:
            st.subheader("🔮 Near-Term Aging Pipeline Exposure (200–299 Days)")
            st.markdown("This view isolates warehouse stock items currently between **200 and 299 days old**. These products are on track to enter the **300–399 days incentive slab** within the next 1 to 100 days.")
            
            df_upcoming = df_master[(df_master['Age'] >= 200) & (df_master['Age'] < 300)].copy()
            
            if not df_upcoming.empty:
                pipe_qty = df_upcoming['AvailableQuantity'].sum()
                pipe_ctc = df_upcoming['TotalCTC'].sum()
                
                col_p1, col_p2 = st.columns(2)
                col_p1.metric("📦 Incoming Slab Stock Volume", f"{int(round(pipe_qty)):,} Units")
                col_p2.metric("💵 Total Asset Cost Exposure (Calculated CTC)", f"₹ {round(pipe_ctc):,}")
                
                st.markdown("#### Itemized Pipeline Ledger of Upcoming Assets")
                display_upcoming = df_upcoming[['ProductID', 'ProductName', 'Age', 'AvailableQuantity', 'CTC', 'TotalCTC', 'Brand', 'Category']].copy()
                
                display_upcoming['AvailableQuantity'] = display_upcoming['AvailableQuantity'].round(0).astype(int)
                display_upcoming['CTC'] = display_upcoming['CTC'].round(0).astype(int)
                display_upcoming['TotalCTC'] = display_upcoming['TotalCTC'].round(0).astype(int)
                display_upcoming['Age'] = display_upcoming['Age'].astype(int)
                
                st.dataframe(display_upcoming.sort_values(by='Age', ascending=False), use_container_width=True, hide_index=True)
            else:
                st.info("No products found in the master stock report matching the 200–299 days pipeline window.")

        # ---------------------------------------------------------
        # HIDE PROCESSED TRANSACTION LEDGER (COLLAPSED BY DEFAULT)
        # ---------------------------------------------------------
        st.markdown("---")
        with st.expander("📋 View Processed Transaction Line Items (Hidden by Default)", expanded=False):
            export_cols = ['BillNumber', 'BillDate', 'SalesPerson', 'ProductID', 'ProductName', 'ProductAge', 'AgeBucket', 'CalculatedDiscountPct', 'MRP', 'Quantity', 'AchievedIncentive']
            df_ledger = df_sales_filtered[export_cols].copy()
            
            df_ledger['CalculatedDiscountPct'] = df_ledger['CalculatedDiscountPct'].round(0)
            df_ledger['MRP'] = df_ledger['MRP'].round(0)
            df_ledger['Quantity'] = df_ledger['Quantity'].round(0)
            df_ledger['AchievedIncentive'] = df_ledger['AchievedIncentive'].round(0)
            
            st.dataframe(df_ledger, use_container_width=True, hide_index=True)
            
    except Exception as e:
        st.error(f"Error parsing datasets. Ensure files match required system schemas. Details: {e}")
else:
    st.info("💡 Complete Dashboard initialization is pending. Please upload your Master Stock and Product Wise Sales CSV files via the sidebar configuration panel.")
`
        }
      }, document.getElementById("root"));
    </script>
  </body>
</html>
